services:
  lucos_backups:
    build: .
    container_name: lucos_backups
    image: lucas42/lucos_backups
    ports:
      - $PORT:$PORT
    environment:
      - PORT
      - SSH_PRIVATE_KEY
      - GITHUB_KEY
      - SCHEDULE_TRACKER_ENDPOINT
      - LOGANNE_ENDPOINT
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT}/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always
    network_mode: host
