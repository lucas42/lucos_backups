version: 2
updates:
  - package-ecosystem: pip
    directory: /src
    schedule:
      interval: daily
      time: '07:00'
    open-pull-requests-limit: 10
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    open-pull-requests-limit: 10
    allow:
      - dependency-type: all
    ignore:
      # Ignore Python pre-release image tags (alpha/beta/rc) — pipenv can't
      # find compatible wheels for pre-release Python builds.
      # Wildcard matches the normalized internal form Dependabot uses for alpine
      # pre-release tags (e.g. 3.15.0a2-alpine → 3.15.0a2.pre.alpine.a).
      # If this silently fails, fall back to per-series range rules — see #189.
      - dependency-name: "python"
        versions:
          - "*.pre.alpine.a"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
