version: 2
updates:
  - package-ecosystem: pip
    directory: /src
    schedule:
      interval: daily
      time: '07:00'
    open-pull-requests-limit: 10
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    open-pull-requests-limit: 10
    allow:
      - dependency-type: all
    ignore:
      # Ignore Python pre-release image tags (alpha/beta/rc) — pipenv can't
      # find compatible wheels for pre-release Python builds.
      # Use the range format Dependabot applies internally to Docker alpine tags
      # (e.g. 3.15.0a2-alpine is treated as 3.15.0a2.pre.alpine.a internally).
      # Add a new entry here when a new Python minor pre-release series starts.
      - dependency-name: "python"
        versions:
          - ">= 3.15.0a1.pre.alpine.a, < 3.15.1"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
